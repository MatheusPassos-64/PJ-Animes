<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trailer Player</title>
    <style>
        /* O CSS fica embutido aqui dentro porque é exclusivo desta janela */
        body {
            margin: 0;
            background: transparent;
            overflow: hidden;
        }
         
        #yt-player {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 320px;
            height: 180px;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(255, 123, 0, 0.8);
            z-index: 9999;
        }
         
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>
 
    <div id="yt-player">
        <iframe src="https://www.youtube.com/embed/SAhdAyMMB3o?si=WSYPBZiI9hlEMNFp" 
                title="YouTube video player" 
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
                referrerpolicy="strict-origin-when-cross-origin" 
                allowfullscreen>
        </iframe>
    </div>
    <ul class="navbar">
        <li><a href="index.html">Home</a></li>
        <li><a href="mangas.html">Mangás</a></li>
        <li><a href="Animes.html">AnimeStreem</a></li>
    </ul>
</body>
</html>
